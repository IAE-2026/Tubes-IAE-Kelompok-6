worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 80;
        server_name localhost;

        # Gateway status
        location = / {
            add_header Content-Type application/json;
            return 200 '{"status":"success","message":"Smart Parking API Gateway TEAM-06","services":{"service_a":"lahan-lokasi active","service_b":"transaksi-parkir active","service_c":"membership-voucher active"}}';
        }

        # Health check lewat gateway
        location = /health {
            add_header Content-Type application/json;
            return 200 '{"status":"success","message":"API Gateway is running","team_id":"TEAM-06"}';
        }

        location = /health/service-a {
            proxy_pass http://smart-parking-service-a-app:3001/up;
        }

        location = /health/service-b {
            proxy_pass http://smart-parking-service-b-app:3002/health;
        }

        location = /health/service-c {
            proxy_pass http://smart-parking-service-c-app:8000/up;
        }

        # Service A - Farid: Lahan & Lokasi
        location /api/v1/locations {
            proxy_pass http://smart-parking-service-a-app:3001;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-IAE-KEY $http_x_iae_key;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/events {
            proxy_pass http://smart-parking-service-a-app:3001;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-IAE-KEY $http_x_iae_key;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/sso {
            proxy_pass http://smart-parking-service-a-app:3001;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-IAE-KEY $http_x_iae_key;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Service B - Hadid: Transaksi Parkir & Payment
        location /api/v1/transactions {
            proxy_pass http://smart-parking-service-b-app:3002;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-IAE-KEY $http_x_iae_key;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /graphql {
            proxy_pass http://smart-parking-service-b-app:3002;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-IAE-KEY $http_x_iae_key;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /graphiql {
            proxy_pass http://smart-parking-service-b-app:3002;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-IAE-KEY $http_x_iae_key;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Service C - Dinda: Membership & Voucher
        location /api/v1/memberships {
            proxy_pass http://smart-parking-service-c-app:8000;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-IAE-KEY $http_x_iae_key;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/sso {
            proxy_pass http://smart-parking-service-c-app:8000;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-IAE-KEY $http_x_iae_key;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
