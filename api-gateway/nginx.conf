worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;
    sendfile            on;
    keepalive_timeout   65;

    # Logger setup
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 80;
        server_name localhost;

        # ==========================================
        # 🚗 SERVICE A: LAHAN & LOKASI (Farid Maulana)
        # ==========================================
        # Route locations endpoints
        location /api/v1/locations {
            proxy_pass http://smart-parking-service-a-app:3001/api/v1/locations;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Route SSO Authentication endpoints
        location /api/v1/sso {
            proxy_pass http://smart-parking-service-a-app:3001/api/v1/sso;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ==========================================
        # 📝 SERVICE B: TRANSAKSI (Placeholder)
        # ==========================================
        # Once Service B is live, uncomment this block:
        # location /api/v1/transactions {
        #     proxy_pass http://smart-parking-service-b-app:3002/api/v1/transactions;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # ==========================================
        # 💳 SERVICE C: PEMBAYARAN (Placeholder)
        # ==========================================
        # Once Service C is live, uncomment this block:
        # location /api/v1/payments {
        #     proxy_pass http://smart-parking-service-c-app:3003/api/v1/payments;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # API Gateway Status
        location / {
            return 200 '{"status":"success","message":"Welcome to Smart Parking API Gateway (TEAM-06)","services":{"service_a":"active","service_b":"inactive","service_c":"inactive"}}';
            add_header Content-Type application/json;
        }
    }
}
